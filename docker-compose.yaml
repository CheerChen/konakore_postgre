# docker-compose.yaml

services:
  # 1. Simplified PostgreSQL Service
  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      - POSTGRES_USER=konakore
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=konakore
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konakore -d konakore"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 2. New Python API Service (replaces PostgREST)
  api:
    image: konakore_postgre_api:latest
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-konakore}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
      - POSTGRES_DB=${POSTGRES_DB:-konakore}
      - FILE_SYNC_URL=http://worker:8090

  # 3. Go Worker Service (scheduler + file sync)
  worker:
    image: konakore_postgre_worker:latest
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8090:8090'
    volumes:
      - ./wallpaper:/wallpaper
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-konakore}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret}
      - POSTGRES_DB=${POSTGRES_DB:-konakore}
      - WORKER_HTTP_ADDR=:8090
      - ARIA2_URL=http://aria2:6800/jsonrpc
      - ARIA2_SECRET=
      - DOWNLOAD_BASE_PATH=/wallpaper

  # 4. Frontend Service (React + Vite + Nginx)
  frontend:
    image: konakore_postgre_frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - api
    ports:
      - '5173:5173'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
